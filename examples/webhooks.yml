# Example .mergewire.yml mapping matched rules to Webhook deliveries
# For the corresponding GitHub Action YAML, see webhooks-workflow.yml
version: 1

defaults:
  reviewers:
    teams: ["security-ops"]

rules:
  # 1. Incident webhook on database deletions
  - id: "database-deletion-alert"
    description: "Trigger an incident webhook on database deletion."
    severity: critical
    notify:
      webhook: "incident"
    reviewers:
      teams: ["data-platform"]
    when:
      actions: ["delete"]
      categories: ["database"]

  # 2. Audit webhook for broad IAM modifications
  - id: "iam-tickets"
    description: "Notify an internal audit workflow whenever IAM policies are modified."
    severity: medium
    notify:
      webhook: "audit"
    reviewers:
      teams: ["infrastructure"]
    when:
      actions: ["create", "update"]
      categories: ["iam"]
