name: MergeWire

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.mergewire.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-review:
    name: Terraform Plan & Review
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'
          terraform_wrapper: false

      # Add your cloud provider credentials step here.
      # See aws-oidc.yml for an AWS OIDC example.

      - name: MergeWire
        uses: mergewire/action@v1
        with:
          api-url: ${{ vars.MERGEWIRE_API_URL }}
          api-key: ${{ secrets.MERGEWIRE_API_KEY }}
          terraform-root: ./infrastructure
