# ============================================================================
# MergeWire Cost-Aware Rules Configuration
# ============================================================================
# This file defines cost-based routing rules for Terraform PRs.
# Cost rules require Infracost integration and a paid plan tier.
#
# Key Concepts:
#   - Cost rules evaluate monthly cost deltas from Infracost
#   - Thresholds can be PR-wide or scoped to matching resources
#   - Cost rules CANNOT request reviewers (use regular rules for that)
#   - Use notify.slackFinance to alert finance teams
#
# Documentation: https://docs.mergewire.app/cost-rules
# ============================================================================

version: 1

defaults:
  reviewers:
    teams: []
    users: []

# ============================================================================
# COST RULE TYPES
# ============================================================================
#
# 1. PR-WIDE COST RULES
#    Evaluate against the total monthly delta for the entire PR.
#    No resource filtering (no resourceTypes, services, or categories).
#
# 2. SCOPED COST RULES
#    Evaluate cost only for resources matching the filters.
#    Supports: resourceTypes, services, categories, filePaths, actions
#
# 3. COST + VOLUME RULES
#    Combine cost thresholds with changeCount or changePercentage.
#    Useful for: "Alert if we're spending $500+ AND creating 10+ resources"
#
# 4. FINANCE NOTIFICATIONS
#    Use notify.slackFinance: true to send alerts to finance Slack.
#    Requires FINANCE_SLACK_WEBHOOK_URL environment variable.
#
# Cost condition:
#   cost:
#     monthlyDeltaUsdGte: <number>  # Minimum monthly cost increase
# ============================================================================

rules:
  # ==========================================================================
  # PR-WIDE COST RULES
  # ==========================================================================
  # These rules evaluate against the total PR cost impact.
  # They add cost findings to GitHub but do not block merges.

  # Alert on PRs with $250+/month total cost impact
  - id: monthly-budget-alert
    description: Flag PRs with at least $250/month cost impact
    when:
      cost:
        monthlyDeltaUsdGte: 250
    severity: medium

  # Alert on significant cost increases
  - id: significant-cost-spike
    description: Flag PRs with $1000+/month cost impact
    when:
      cost:
        monthlyDeltaUsdGte: 1000
    severity: high

  # ==========================================================================
  # SCOPED COST RULES
  # ==========================================================================
  # These rules evaluate cost only for matching resources.
  # The threshold applies to the sum of matching resource costs only.

  # Production compute cost monitoring
  - id: production-vm-cost-spike
    description: Highlight large production compute changes
    when:
      actions:
        - create
        - update
        - replace
      filePaths:
        - 'environments/prod/**/*'
      resourceTypes:
        - aws_instance
        - google_compute_instance
        - azurerm_linux_virtual_machine
        - azurerm_windows_virtual_machine
      cost:
        monthlyDeltaUsdGte: 100
    severity: medium

  # Database cost monitoring
  - id: database-cost-alert
    description: Flag expensive database additions
    when:
      categories: ['database']
      actions: ['create', 'replace']
      cost:
        monthlyDeltaUsdGte: 500
    severity: high

  # Storage cost monitoring
  - id: storage-cost-alert
    description: Flag large storage cost increases
    when:
      categories: ['storage']
      cost:
        monthlyDeltaUsdGte: 200
    severity: medium

  # Service-specific cost monitoring
  - id: eks-cost-alert
    description: Flag expensive EKS cluster changes
    when:
      services: ['aws:eks']
      cost:
        monthlyDeltaUsdGte: 300
    severity: medium

  # ==========================================================================
  # COST + VOLUME RULES
  # ==========================================================================
  # Combine cost thresholds with change volume constraints.
  # Useful for detecting "death by a thousand cuts" cost patterns.

  # High volume of low-cost resources adding up
  - id: volume-cost-risk
    description: Many new resources with combined $500+ cost
    when:
      actions: ['create']
      changeCount:
        createGte: 10
      cost:
        monthlyDeltaUsdGte: 500
    severity: medium

  # Proportional blast radius with cost
  - id: high-percentage-with-cost
    description: High percentage of infrastructure changing with cost impact
    when:
      changePercentage:
        totalGte: 25
      cost:
        monthlyDeltaUsdGte: 250
    severity: high

  # Compute scaling cost check
  - id: compute-scaling-cost
    description: Scaling compute with $200+ monthly cost
    when:
      categories: ['compute']
      actions: ['create']
      changeCount:
        createGte: 5
      cost:
        monthlyDeltaUsdGte: 200
    severity: medium

  # Database blast radius with cost
  - id: database-volume-cost
    description: Multiple expensive database changes
    when:
      categories: ['database']
      changeCount:
        totalGte: 3
      cost:
        monthlyDeltaUsdGte: 1000
    severity: high

  # ==========================================================================
  # FINANCE NOTIFICATIONS
  # ==========================================================================
  # Send Slack notifications to finance teams for material changes.
  # Requires FINANCE_SLACK_WEBHOOK_URL environment variable.

  # Finance notification for large cost increases
  # slackFinance: server-side notification via workspace Slack config in MergeWire
  # slack: client-side notification via your own webhook (slack-webhooks action input)
  # Both can be used together to notify different audiences.
  - id: finance-alert-large
    description: Notify finance about material monthly cost increases
    when:
      cost:
        monthlyDeltaUsdGte: 500
    severity: medium
    notify:
      slackFinance: true
      slack: finance

  # Finance notification for production database costs
  - id: finance-alert-prod-db
    description: Notify finance about production database costs
    when:
      categories: ['database']
      filePaths:
        - 'environments/prod/**/*'
      cost:
        monthlyDeltaUsdGte: 300
    severity: medium
    notify:
      slackFinance: true

  # Finance notification for high-volume changes
  - id: finance-alert-volume
    description: Notify finance about high-volume infrastructure additions
    when:
      actions: ['create']
      changeCount:
        createGte: 20
      cost:
        monthlyDeltaUsdGte: 250
    severity: medium
    notify:
      slackFinance: true

  # ==========================================================================
  # TIERED COST RULES
  # ==========================================================================
  # Create escalating alerts based on cost thresholds.

  # Low tier - informational
  - id: cost-tier-low
    description: Minor cost increase detected
    when:
      cost:
        monthlyDeltaUsdGte: 100
    severity: low

  # Medium tier - attention needed
  - id: cost-tier-medium
    description: Moderate cost increase detected
    when:
      cost:
        monthlyDeltaUsdGte: 500
    severity: medium

  # High tier - review required
  - id: cost-tier-high
    description: Significant cost increase detected
    when:
      cost:
        monthlyDeltaUsdGte: 1000
    severity: high

  # Critical tier - finance notification
  - id: cost-tier-critical
    description: Major cost increase detected - finance review required
    when:
      cost:
        monthlyDeltaUsdGte: 5000
    severity: critical
    notify:
      slackFinance: true

  # ==========================================================================
  # MULTI-CLOUD COST EXAMPLES
  # ==========================================================================
  # Examples of cost rules working across cloud providers.

  # Compute cost across all clouds
  - id: multi-cloud-compute-cost
    description: Expensive compute resources across any cloud
    when:
      categories: ['compute']
      resourceTypes:
        - aws_instance
        - aws_eks_node_group
        - google_compute_instance
        - google_container_node_pool
        - azurerm_linux_virtual_machine
        - azurerm_kubernetes_cluster_node_pool
      cost:
        monthlyDeltaUsdGte: 400
    severity: medium

  # Database cost across all clouds
  - id: multi-cloud-database-cost
    description: Expensive database resources across any cloud
    when:
      categories: ['database']
      services:
        - aws:rds
        - aws:dynamodb
        - gcp:sql
        - azure:sql
        - azure:cosmosdb
      cost:
        monthlyDeltaUsdGte: 1000
    severity: high
