name: MergeWire (Multi-Root)

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".mergewire.yml"

permissions:
  contents: read
  pull-requests: write
  id-token: write # Required for OIDC token exchange

jobs:
  terraform-review:
    name: Terraform Plan & Review (${{ matrix.environment }})
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    strategy:
      fail-fast: false # Continue other roots if one fails
      matrix:
        include:
          - terraform-root: ./infrastructure/networking
            environment: networking
            workspace: default
          - terraform-root: ./infrastructure/app
            environment: app-prod
            workspace: production
          - terraform-root: ./infrastructure/data
            environment: data-prod
            workspace: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: MergeWire
        uses: mergewire/action@v1
        with:
          api-url: ${{ vars.MERGEWIRE_API_URL }}
          api-key: ${{ secrets.MERGEWIRE_API_KEY }}
          terraform-root: ${{ matrix.terraform-root }}
          environment: ${{ matrix.environment }}
          workspace: ${{ matrix.workspace }}
          fail-on-api-error: false
